name: FastThings
version: '${version}'
main: io.github.ash.fastcrops.FastCropsPlugin
api-version: '1.21'
description: Accelerates crops, saplings, and optional hoppers using tracked random-tick-like attempts.
authors: [starboyash]

commands:
  fastthings:
    description: FastThings admin commands
    usage: /fastthings <status|reload|set|toggle>
    aliases: [fthings, fastcrops, fcrops]
    permission: fastthings.admin

permissions:
  fastthings.admin:
    description: Allows all FastThings commands
    default: op
  fastcrops.admin:
    description: Legacy alias for FastThings admin command access
    default: op
    children:
      fastthings.admin: true
